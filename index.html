<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watermark Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #e0e0ff; }
    p.subtitle { color: #aaa; margin-bottom: 30px; font-size: 0.95rem; }
    .card { background: #16213e; border-radius: 16px; padding: 30px; width: 100%; max-width: 700px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); margin-bottom: 24px; }
    .card h2 { font-size: 1rem; color: #a0a8d0; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .upload-area { border: 2px dashed #3a3a6e; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .upload-area:hover, .upload-area.drag-over { border-color: #7c7cff; background: rgba(124,124,255,0.05); }
    .upload-area input { display: none; }
    .upload-area .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-area p { color: #888; font-size: 0.9rem; }
    .upload-area span { color: #7c7cff; font-weight: 600; }
    .control-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .control-row label { font-size: 0.9rem; color: #bbb; min-width: 120px; }
    input[type="range"] { flex: 1; accent-color: #7c7cff; min-width: 150px; }
    .value-badge { background: #0f3460; color: #e0e0ff; padding: 3px 10px; border-radius: 20px; font-size: 0.85rem; min-width: 48px; text-align: center; }
    .toggle-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .toggle-row label { font-size: 0.9rem; color: #bbb; }
    .switch { position: relative; display: inline-block; width: 52px; height: 28px; }
    .switch input { display: none; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #3a3a6e; border-radius: 28px; transition: 0.3s; }
    .slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
    .switch input:checked + .slider { background: #7c7cff; }
    .switch input:checked + .slider:before { transform: translateX(24px); }
    .folder-input { width: 100%; padding: 12px 16px; background: #0f3460; border: 1px solid #3a3a6e; border-radius: 10px; color: #eee; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .folder-input:focus { border-color: #7c7cff; }
    #preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 16px; }
    .preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: #0f3460; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-item .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #7c7cff, #5555cc); color: white; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    #progress-wrap { display: none; margin-top: 16px; }
    #progress-bar-bg { background: #0f3460; border-radius: 10px; height: 10px; overflow: hidden; }
    #progress-bar { height: 100%; background: linear-gradient(90deg, #7c7cff, #5555cc); width: 0%; transition: width 0.2s; border-radius: 10px; }
    #progress-label { font-size: 0.85rem; color: #aaa; margin-top: 6px; text-align: center; }
    #file-count { font-size: 0.85rem; color: #7c7cff; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🖼️ Watermark Tool</h1>
  <p class="subtitle">Carica le foto, imposta il watermark e scarica tutto in un ZIP</p>

  <div class="card">
    <h2>1. Carica le immagini</h2>
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" multiple accept="image/*" />
      <div class="icon">📁</div>
      <p><span>Clicca qui</span> oppure trascina le immagini</p>
      <p style="margin-top:6px">JPG, PNG, WEBP — nessun limite di numero</p>
    </div>
    <div id="file-count"></div>
    <div id="preview-grid"></div>
  </div>

  <div class="card">
    <h2>2. Impostazioni watermark</h2>
    <div class="control-row">
      <label>Opacità</label>
      <input type="range" id="opacity-slider" min="0" max="100" value="40" />
      <span class="value-badge" id="opacity-value">40%</span>
    </div>
    <div class="control-row">
      <label>Dimensione</label>
      <input type="range" id="size-slider" min="10" max="100" value="50" />
      <span class="value-badge" id="size-value">50%</span>
    </div>
    <div class="toggle-row">
      <label>Bianco e nero</label>
      <label class="switch">
        <input type="checkbox" id="bw-toggle" />
        <span class="slider"></span>
      </label>
      <span style="font-size:0.85rem; color:#888">Rimuove i colori dal watermark</span>
    </div>
  </div>

  <div class="card">
    <h2>3. Nome cartella ZIP</h2>
    <input type="text" class="folder-input" id="folder-name" placeholder="es. foto_con_watermark" value="foto_con_watermark" />
  </div>

  <div class="card">
    <button class="btn btn-primary" id="process-btn" disabled>
      ⚡ Applica watermark e scarica ZIP
    </button>
    <div id="progress-wrap">
      <div id="progress-bar-bg"><div id="progress-bar"></div></div>
      <div id="progress-label">Elaborazione...</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    var uploadArea   = document.getElementById('upload-area');
    var fileInput    = document.getElementById('file-input');
    var previewGrid  = document.getElementById('preview-grid');
    var fileCount    = document.getElementById('file-count');
    var opacitySlider = document.getElementById('opacity-slider');
    var opacityValue  = document.getElementById('opacity-value');
    var sizeSlider   = document.getElementById('size-slider');
    var sizeValue    = document.getElementById('size-value');
    var bwToggle     = document.getElementById('bw-toggle');
    var folderName   = document.getElementById('folder-name');
    var processBtn   = document.getElementById('process-btn');
    var progressWrap = document.getElementById('progress-wrap');
    var progressBar  = document.getElementById('progress-bar');
    var progressLabel = document.getElementById('progress-label');
    var wmImg        = document.getElementById('wm-img');

    var files = [];

    uploadArea.addEventListener('click', function(e) {
      if (e.target === fileInput) return;
      fileInput.click();
    });
    uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('drag-over'); });
    uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('drag-over'); addFiles(Array.prototype.slice.call(e.dataTransfer.files)); });
    fileInput.addEventListener('change', function() { if (fileInput.files.length) { addFiles(Array.prototype.slice.call(fileInput.files)); fileInput.value = ''; } });

    function addFiles(newFiles) {
      newFiles.forEach(function(f) {
        if (!f.type.startsWith('image/')) return;
        files.push(f);
        addPreview(f, files.length - 1);
      });
      updateCount();
      processBtn.disabled = files.filter(Boolean).length === 0;
    }

    function addPreview(file, index) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var item = document.createElement('div');
        item.className = 'preview-item';
        var img = document.createElement('img');
        img.src = e.target.result;
        var btn = document.createElement('button');
        btn.className = 'remove-btn';
        btn.innerHTML = '&#x2715;';
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          files[index] = null;
          item.remove();
          updateCount();
          processBtn.disabled = files.filter(Boolean).length === 0;
        });
        item.appendChild(img);
        item.appendChild(btn);
        previewGrid.appendChild(item);
      };
      reader.readAsDataURL(file);
    }

    function updateCount() {
      var n = files.filter(Boolean).length;
      fileCount.textContent = n > 0 ? n + ' immagini caricate' : '';
    }

    opacitySlider.addEventListener('input', function() { opacityValue.textContent = opacitySlider.value + '%'; });
    sizeSlider.addEventListener('input', function() { sizeValue.textContent = sizeSlider.value + '%'; });

    processBtn.addEventListener('click', function() {
      var activeFiles = files.filter(Boolean);
      if (activeFiles.length === 0) return;
      var opacity = parseInt(opacitySlider.value) / 100;
      var sizePercent = parseInt(sizeSlider.value) / 100;
      var grayscale = bwToggle.checked;
      var zipName = (folderName.value.trim() || 'foto_con_watermark').replace(/[^a-zA-Z0-9_\-\.]/g, '_');

      processBtn.disabled = true;
      progressWrap.style.display = 'block';

      var zip = new JSZip();
      var folder = zip.folder(zipName);
      var i = 0;

      function processNext() {
        if (i >= activeFiles.length) {
          progressLabel.textContent = 'Creazione ZIP...';
          progressBar.style.width = '95%';
          zip.generateAsync({ type: 'blob' }).then(function(zipBlob) {
            var url = URL.createObjectURL(zipBlob);
            var a = document.createElement('a');
            a.href = url;
            a.download = zipName + '.zip';
            a.click();
            URL.revokeObjectURL(url);
            progressBar.style.width = '100%';
            progressLabel.textContent = 'Download avviato!';
            processBtn.disabled = false;
            setTimeout(function() { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 3000);
          });
          return;
        }
        var file = activeFiles[i];
        progressLabel.textContent = 'Elaborazione ' + (i + 1) + ' / ' + activeFiles.length + ': ' + file.name;
        progressBar.style.width = ((i / activeFiles.length) * 100) + '%';
        applyWatermark(file, opacity, sizePercent, grayscale).then(function(blob) {
          var ext = file.name.split('.').pop();
          var baseName = file.name.replace(/\.[^.]+$/, '');
          folder.file(baseName + '_wm.' + ext, blob);
          i++;
          processNext();
        });
      }
      processNext();
    });

    function applyWatermark(file, opacity, sizePercent, grayscale) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            var wmCanvas = document.createElement('canvas');
            var wmCtx = wmCanvas.getContext('2d');
            var shortSide = Math.min(img.width, img.height);
            var wmW = Math.round(shortSide * sizePercent);
            var wmH = Math.round((wmImg.naturalHeight / wmImg.naturalWidth) * wmW);
            wmCanvas.width = wmW;
            wmCanvas.height = wmH;
            wmCtx.drawImage(wmImg, 0, 0, wmW, wmH);

            if (grayscale) {
              var imageData = wmCtx.getImageData(0, 0, wmW, wmH);
              var d = imageData.data;
              for (var j = 0; j < d.length; j += 4) {
                var gray = 0.299 * d[j] + 0.587 * d[j+1] + 0.114 * d[j+2];
                d[j] = d[j+1] = d[j+2] = gray;
              }
              wmCtx.putImageData(imageData, 0, 0);
            }

            var x = Math.round((img.width - wmW) / 2);
            var y = Math.round((img.height - wmH) / 2);
            ctx.globalAlpha = opacity;
            ctx.drawImage(wmCanvas, x, y, wmW, wmH);
            ctx.globalAlpha = 1;

            var mimeType = file.type || 'image/jpeg';
            canvas.toBlob(function(blob) { resolve(blob); }, mimeType, 0.92);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
